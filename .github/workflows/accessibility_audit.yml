name: accessibility-audit

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
    audit:
        timeout-minutes: 60
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
        - name: "git checkout"
          uses: actions/checkout@v7

        - name: "install runner deps"
          run: |
            npm init -y
            npm install --no-save @axe-core/playwright@4 playwright@1 glob@11

        - name: "cache playwright browsers"
          uses: actions/cache@v6
          id: playwright-cache
          with:
            path: ~/.cache/ms-playwright
            key: playwright-chromium-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

        - name: "install playwright browser"
          if: steps.playwright-cache.outputs.cache-hit != 'true'
          run: npx playwright install --with-deps chromium

        - name: "install playwright os deps only (cache hit)"
          if: steps.playwright-cache.outputs.cache-hit == 'true'
          run: npx playwright install-deps chromium

        - name: "run axe over ./index.html"
          run: node docs/audit.mjs

        - name: "upload report artifact"
          uses: actions/upload-artifact@v7
          with:
            name: accessibility-report
            path: |
              docs/audit.html
              docs/audit-*.json
